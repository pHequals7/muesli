name: Code Review
on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Focus on:
            - Swift crashes: force unwraps, unguarded optionals, missing error handling
            - Thread safety: actor isolation, @MainActor, concurrent state access
            - CoreML issues: shape mismatches, stride bugs, buffer reuse
            - Security: Keychain usage, API key/token handling
            - Logic bugs and edge cases

            Post inline comments on specific lines using the inline comment tool.
            Post a summary comment on the PR using `gh pr comment`.
            Be concise — only flag real issues, not style preferences.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep"
