<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muesli Flame Graph Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; background: #1a1a1a; color: #e8e8e8; height: 100vh; display: flex; flex-direction: column; }

  #toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; background: #242424; border-bottom: 1px solid #333;
    flex-shrink: 0;
  }
  #toolbar h1 { font-size: 14px; font-weight: 600; color: #fff; letter-spacing: -0.2px; }
  #file-input { display: none; }
  label[for="file-input"] {
    cursor: pointer; padding: 5px 12px; border-radius: 6px;
    background: #3a7bd5; color: #fff; font-size: 12px; font-weight: 500;
    transition: background 0.15s;
  }
  label[for="file-input"]:hover { background: #2f6bc4; }
  #filename { font-size: 12px; color: #888; flex: 1; }
  #stats { font-size: 12px; color: #666; }

  #thread-tabs {
    display: flex; gap: 0; background: #1e1e1e; border-bottom: 1px solid #333;
    flex-shrink: 0; overflow-x: auto;
  }
  .thread-tab {
    padding: 6px 14px; font-size: 12px; color: #888; cursor: pointer;
    border-bottom: 2px solid transparent; white-space: nowrap; transition: color 0.1s;
  }
  .thread-tab:hover { color: #ccc; }
  .thread-tab.active { color: #3a7bd5; border-bottom-color: #3a7bd5; }

  #canvas-container {
    flex: 1; overflow: auto; position: relative; background: #1a1a1a;
  }
  canvas { display: block; cursor: crosshair; }

  #tooltip {
    position: fixed; pointer-events: none;
    background: rgba(20, 20, 20, 0.95); border: 1px solid #444;
    border-radius: 6px; padding: 8px 10px; font-size: 12px; line-height: 1.5;
    max-width: 300px; z-index: 100; display: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  #tt-name { font-weight: 600; color: #fff; margin-bottom: 3px; }
  #tt-cat, #tt-thread { color: #aaa; }
  #tt-dur { color: #4fc3f7; font-weight: 500; }

  #empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #555; gap: 8px;
  }
  #empty-state svg { opacity: 0.3; }
  #empty-state p { font-size: 14px; }
  #empty-state small { font-size: 12px; color: #444; }

  #zoom-controls {
    position: absolute; bottom: 12px; right: 12px;
    display: flex; gap: 4px;
  }
  .zoom-btn {
    width: 28px; height: 28px; border-radius: 6px;
    background: #333; border: 1px solid #444; color: #ccc;
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .zoom-btn:hover { background: #444; }
  #zoom-reset { width: auto; padding: 0 8px; font-size: 11px; }
</style>
</head>
<body>

<div id="toolbar">
  <h1>Muesli Flame Graph</h1>
  <input type="file" id="file-input" accept=".json">
  <label for="file-input">Open Profile</label>
  <span id="filename">No file loaded</span>
  <span id="stats"></span>
</div>

<div id="thread-tabs" style="display:none"></div>

<div id="canvas-container">
  <div id="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M3 3v18h18"/><path d="m7 16 4-4 4 4 4-8"/>
    </svg>
    <p>Open a Speedscope profile to view the flame graph</p>
    <small>Generated by running Muesli with the --profile flag</small>
  </div>
  <canvas id="canvas" style="display:none"></canvas>
  <div id="zoom-controls" style="display:none">
    <button class="zoom-btn" id="zoom-in">+</button>
    <button class="zoom-btn" id="zoom-out">&#8722;</button>
    <button class="zoom-btn" id="zoom-reset">Reset</button>
  </div>
</div>

<div id="tooltip">
  <div id="tt-name"></div>
  <div id="tt-cat"></div>
  <div id="tt-thread"></div>
  <div id="tt-dur"></div>
</div>

<script>
const ROW_H = 22;
const MIN_PX_WIDTH = 1;
const CATEGORY_COLORS = {
  startup:   ['#1565c0','#1976d2','#1e88e5','#2196f3','#42a5f5'],
  dictation: ['#1b5e20','#2e7d32','#388e3c','#43a047','#66bb6a'],
  meeting:   ['#4a148c','#6a1b9a','#7b1fa2','#8e24aa','#ab47bc'],
  default:   ['#37474f','#455a64','#546e7a','#607d8b','#78909c'],
};
const LABEL_COLOR = 'rgba(255,255,255,0.9)';

let profileData = null;
let currentThreadIdx = 0;
let zoom = 1;
let panX = 0;
let renderedSpans = [];

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const container = document.getElementById('canvas-container');

// ----- File loading -----
document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('filename').textContent = file.name;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      loadProfile(JSON.parse(ev.target.result));
    } catch(err) {
      alert('Failed to parse profile: ' + err.message);
    }
  };
  reader.readAsText(file);
});

function loadProfile(data) {
  profileData = parseSpeedscope(data);
  currentThreadIdx = 0;
  zoom = 1;
  panX = 0;
  buildThreadTabs();
  render();
  canvas.style.display = 'block';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('thread-tabs').style.display = 'flex';
  document.getElementById('zoom-controls').style.display = 'flex';
  const totalMs = profileData.threads.reduce(function(m, t) { return Math.max(m, t.totalMs); }, 0);
  document.getElementById('stats').textContent =
    profileData.threads.length + ' thread' + (profileData.threads.length !== 1 ? 's' : '') +
    ' \u00b7 ' + totalMs.toFixed(1) + ' ms total';
}

// ----- Speedscope parser -----
function parseSpeedscope(root) {
  const frames = root.shared.frames;
  const threads = root.profiles.map(function(profile) {
    const events = profile.events || [];
    const openStack = [];
    const spans = [];

    for (let i = 0; i < events.length; i++) {
      const evt = events[i];
      if (evt.type === 'O') {
        openStack.push({ frameIdx: evt.frame, at: evt.at, depth: openStack.length });
      } else if (evt.type === 'C') {
        for (let j = openStack.length - 1; j >= 0; j--) {
          if (openStack[j].frameIdx === evt.frame) {
            const open = openStack.splice(j, 1)[0];
            const frame = frames[evt.frame] || {};
            spans.push({
              name: frame.name || 'unknown',
              category: frame.col || '',
              startMs: open.at,
              durationMs: evt.at - open.at,
              depth: open.depth,
            });
            break;
          }
        }
      }
    }

    let totalMs = profile.endValue || 0;
    if (!totalMs && spans.length) {
      for (let i = 0; i < spans.length; i++) {
        totalMs = Math.max(totalMs, spans[i].startMs + spans[i].durationMs);
      }
    }
    return { name: profile.name, spans: spans, totalMs: totalMs };
  });
  return { threads: threads };
}

// ----- Thread tabs -----
function buildThreadTabs() {
  const tabBar = document.getElementById('thread-tabs');
  while (tabBar.firstChild) tabBar.removeChild(tabBar.firstChild);
  profileData.threads.forEach(function(t, i) {
    const tab = document.createElement('div');
    tab.className = 'thread-tab' + (i === 0 ? ' active' : '');
    tab.textContent = t.name;
    tab.addEventListener('click', function() {
      currentThreadIdx = i;
      zoom = 1; panX = 0;
      const tabs = document.querySelectorAll('.thread-tab');
      tabs.forEach(function(el, j) { el.classList.toggle('active', j === i); });
      render();
    });
    tabBar.appendChild(tab);
  });
}

// ----- Rendering -----
function render() {
  if (!profileData) return;
  const thread = profileData.threads[currentThreadIdx];
  if (!thread) return;

  const totalMs = thread.totalMs || 1;
  let maxDepth = 0;
  for (let i = 0; i < thread.spans.length; i++) {
    if (thread.spans[i].depth > maxDepth) maxDepth = thread.spans[i].depth;
  }

  const W = Math.max(container.clientWidth, Math.floor(totalMs * zoom * 2));
  const H = Math.max(container.clientHeight - 60, (maxDepth + 2) * ROW_H + 30);

  canvas.width = W;
  canvas.height = H;
  ctx.clearRect(0, 0, W, H);
  drawTimeAxis(totalMs, W);

  renderedSpans = [];
  for (let i = 0; i < thread.spans.length; i++) {
    const span = thread.spans[i];
    const x = msToX(span.startMs, totalMs, W) + panX;
    const w = Math.max(MIN_PX_WIDTH, msToX(span.durationMs, totalMs, W));
    const y = (span.depth + 1) * ROW_H + 20;

    const palette = CATEGORY_COLORS[span.category] || CATEGORY_COLORS.default;
    const colorIdx = Math.abs(hashStr(span.name)) % palette.length;
    ctx.fillStyle = palette[colorIdx];
    ctx.fillRect(x, y, w - 1, ROW_H - 2);

    if (w > 20) {
      ctx.fillStyle = LABEL_COLOR;
      ctx.font = '11px -apple-system, sans-serif';
      const maxChars = Math.floor((w - 6) / 7);
      const text = span.name.length > maxChars ? span.name.slice(0, maxChars - 1) + '\u2026' : span.name;
      ctx.fillText(text, x + 4, y + 14);
    }

    renderedSpans.push({ name: span.name, category: span.category, startMs: span.startMs, durationMs: span.durationMs, x: x, y: y, w: w });
  }
}

function drawTimeAxis(totalMs, W) {
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(0, 0, W, 20);
  const stepMs = niceStep(totalMs / Math.max(1, Math.floor(W / 80)));
  for (let t = 0; t <= totalMs + stepMs * 0.5; t += stepMs) {
    const x = msToX(t, totalMs, W) + panX;
    ctx.fillStyle = '#444';
    ctx.fillRect(x, 0, 1, 20);
    ctx.fillStyle = '#777';
    ctx.font = '10px monospace';
    ctx.fillText((t < 1 ? t.toFixed(2) : t.toFixed(0)) + 'ms', x + 3, 14);
  }
}

function msToX(ms, totalMs, W) {
  return Math.floor((ms / totalMs) * (W - panX));
}

function niceStep(rough) {
  if (rough <= 0) return 1;
  const mag = Math.pow(10, Math.floor(Math.log10(rough)));
  const norm = rough / mag;
  if (norm < 1.5) return mag;
  if (norm < 3.5) return 2 * mag;
  if (norm < 7.5) return 5 * mag;
  return 10 * mag;
}

function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return h;
}

// ----- Hover / tooltip -----
canvas.addEventListener('mousemove', function(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  let hit = null;
  for (let i = renderedSpans.length - 1; i >= 0; i--) {
    const s = renderedSpans[i];
    if (mx >= s.x && mx <= s.x + s.w && my >= s.y && my <= s.y + ROW_H - 2) {
      hit = s; break;
    }
  }

  if (hit) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    document.getElementById('tt-name').textContent = hit.name;
    document.getElementById('tt-cat').textContent = hit.category ? 'Category: ' + hit.category : '';
    document.getElementById('tt-thread').textContent = profileData.threads[currentThreadIdx].name;
    document.getElementById('tt-dur').textContent = hit.durationMs.toFixed(3) + ' ms  (start: ' + hit.startMs.toFixed(3) + ' ms)';
  } else {
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('mouseleave', function() { tooltip.style.display = 'none'; });

// ----- Zoom & pan -----
document.getElementById('zoom-in').addEventListener('click', function() { zoom *= 1.5; render(); });
document.getElementById('zoom-out').addEventListener('click', function() { zoom = Math.max(0.1, zoom / 1.5); render(); });
document.getElementById('zoom-reset').addEventListener('click', function() { zoom = 1; panX = 0; render(); });

canvas.addEventListener('wheel', function(e) {
  e.preventDefault();
  if (e.ctrlKey || e.metaKey) {
    zoom = Math.max(0.1, zoom * (e.deltaY > 0 ? 0.8 : 1.25));
  } else {
    panX -= e.deltaX;
  }
  render();
}, { passive: false });

let dragging = false, dragStartX = 0, panAtDrag = 0;
canvas.addEventListener('mousedown', function(e) { dragging = true; dragStartX = e.clientX; panAtDrag = panX; });
window.addEventListener('mouseup', function() { dragging = false; });
window.addEventListener('mousemove', function(e) {
  if (dragging) { panX = panAtDrag + (e.clientX - dragStartX); render(); }
});

window.addEventListener('resize', function() { if (profileData) render(); });
</script>
</body>
</html>
